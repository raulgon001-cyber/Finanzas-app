<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Financiero PRO</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { margin:0; background:#0d0d1f; color:#fff; font-family:system-ui; }
.card { background:#16162a; padding:15px; border-radius:12px; margin-bottom:12px; }
input, select { width:100%; padding:8px; margin:6px 0; border-radius:6px; border:none; }
button { padding:8px 12px; margin-top:8px; border:none; border-radius:6px; cursor:pointer; }
.green { color:#22c55e; }
.red { color:#ef4444; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const {useState, useMemo} = React;

const MXN = n => new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",maximumFractionDigits:0}).format(n||0);

function App(){

const [ingresoMensual, setIngresoMensual] = useState(44000);
const [gastos, setGastos] = useState(30000);
const [extraDeuda, setExtraDeuda] = useState(0);

const [deudas, setDeudas] = useState([
  {nombre:"TDC", saldo:25000, pago:2000},
  {nombre:"Closet", saldo:11000, pago:3000},
]);

// PROYECCIÓN
const proyeccion = useMemo(()=>{

let meses = 0;
let totalAhorro = 0;

let deudasCopy = JSON.parse(JSON.stringify(deudas));

while(deudasCopy.some(d=>d.saldo>0) && meses < 60){

  let disponible = ingresoMensual - gastos;

  // pago base
  deudasCopy.forEach(d=>{
    if(d.saldo>0){
      d.saldo -= d.pago;
      disponible -= d.pago;
    }
  });

  // extra (usuario decide)
  let extra = extraDeuda;

  deudasCopy.forEach(d=>{
    if(extra > 0 && d.saldo > 0){
      let pago = Math.min(extra, d.saldo);
      d.saldo -= pago;
      extra -= pago;
    }
  });

  if(disponible > 0){
    totalAhorro += disponible;
  }

  meses++;
}

return {
  meses,
  ahorro: totalAhorro
};

},[ingresoMensual,gastos,deudas,extraDeuda]);

// agregar deuda
const agregarDeuda = ()=>{
  setDeudas([...deudas,{nombre:"Nueva",saldo:0,pago:0}]);
};

return (
<div style={{padding:15}}>

<h2>📊 Control Financiero PRO</h2>

<div className="card">
<h3>Ingresos y Gastos</h3>

<label>Ingreso mensual</label>
<input type="number" value={ingresoMensual} onChange={e=>setIngresoMensual(+e.target.value)}/>

<label>Gastos mensuales</label>
<input type="number" value={gastos} onChange={e=>setGastos(+e.target.value)}/>

<label>Extra a deudas (opcional)</label>
<input type="number" value={extraDeuda} onChange={e=>setExtraDeuda(+e.target.value)}/>

</div>

<div className="card">
<h3>Deudas</h3>

{deudas.map((d,i)=>(
<div key={i}>
<input value={d.nombre} onChange={e=>{
  let copy=[...deudas]; copy[i].nombre=e.target.value; setDeudas(copy);
}}/>
<input type="number" value={d.saldo} onChange={e=>{
  let copy=[...deudas]; copy[i].saldo=+e.target.value; setDeudas(copy);
}} placeholder="Saldo"/>
<input type="number" value={d.pago} onChange={e=>{
  let copy=[...deudas]; copy[i].pago=+e.target.value; setDeudas(copy);
}} placeholder="Pago mensual"/>
</div>
))}

<button onClick={agregarDeuda}>+ Agregar deuda</button>

</div>

<div className="card">
<h3>Resultado</h3>

<p>📆 Saldrás de deudas en: <b>{proyeccion.meses} meses</b></p>
<p className="green">💰 Ahorro acumulado: {MXN(proyeccion.ahorro)}</p>

</div>

</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
